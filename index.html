<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Matrix IPTV PWA</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
      body {
        background-color: #0d0208;
        color: #00ff41;
        font-family: "Courier New", Courier, monospace;
        margin: 0;
        padding: 0;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        height: 100vh;
      }
      #terminal {
        flex: 1;
        white-space: pre;
        padding: 5px;
        font-size: 1.8vw; /* Responsive font size */
        line-height: 1.1;
        overflow: hidden;
        border-bottom: 1px solid #003b00;
        touch-action: none; /* Prevent browser scrolling to allow custom touch gestures */
      }
      #video-container {
        width: 100%;
        background: #000;
        display: none;
        position: relative; /* ensure overlay positioning works */
        aspect-ratio: 16 / 9;
        border-top: 2px solid #00ff41;
        box-shadow: 0 0 20px rgba(0, 255, 65, 0.4);
      }
      video {
        width: 100%;
        height: 100%;
        outline: none;
      }
      #video-close {
        position: absolute;
        top: 10px;
        right: 10px;
        background: rgba(13, 2, 8, 0.8);
        color: #00ff41;
        border: 1px solid #00ff41;
        padding: 8px 12px;
        cursor: pointer;
        z-index: 10;
        font-weight: bold;
        font-family: inherit;
        backdrop-filter: blur(4px);
        transition: all 0.2s ease;
      }
      #video-close:hover {
        background: #00ff41;
        color: #0d0208;
        box-shadow: 0 0 10px #00ff41;
      }
      .mobile-controls {
        display: none;
        position: absolute;
        bottom: 20px;
        left: 0;
        width: 100%;
        justify-content: center;
        gap: 10px;
        z-index: 10;
        opacity: 0.7;
      }
      .ctrl-btn {
        background: rgba(13, 2, 8, 0.8);
        border: 1px solid #00ff41;
        color: #00ff41;
        padding: 10px 15px;
        font-weight: bold;
        border-radius: 5px;
      }
      @media (min-width: 1024px) {
        #terminal {
          font-size: 14px;
          line-height: 16px;
        }
        #video-container {
          position: absolute;
          bottom: 20px;
          right: 20px;
          width: 480px;
          border: 2px solid #00ff41;
          box-shadow: 0 0 15px rgba(0, 255, 65, 0.5);
        }
      }
      @media (max-width: 1023px) {
        .mobile-controls {
          display: flex;
        }
      }
    </style>
  </head>
  <body>
    <div id="terminal">Loading Matrix Interface...</div>
    <div class="mobile-controls">
      <!-- Added explicit back button for easy exit on mobile without gestures -->
      <button
        class="ctrl-btn"
        onclick="
          document.dispatchEvent(
            new KeyboardEvent('keydown', { key: 'Escape' }),
          )
        "
      >
        ESC / BACK
      </button>
    </div>
    <div id="video-container">
      <button id="video-close" onclick="closeVideo()">[ X ] CLOSE</button>
      <video id="video" controls playsinline></video>
    </div>

    <script>
      // Global function for Wasm to call
      window.playStream = function (url) {
        console.log("[JS] Playing:", url);
        const video = document.getElementById("video");
        const container = document.getElementById("video-container");
        container.style.display = "block";

        if (Hls.isSupported()) {
          const hls = new Hls();
          hls.loadSource(url);
          hls.attachMedia(video);
          hls.on(Hls.Events.MANIFEST_PARSED, function () {
            video.play();
          });
        } else if (video.canPlayType("application/vnd.apple.mpegurl")) {
          // Native HLS support (Safari)
          video.src = url;
          video.addEventListener("loadedmetadata", function () {
            video.play();
          });
        }
      };

      window.closeVideo = function () {
        const video = document.getElementById("video");
        video.pause();
        video.src = "";
        document.getElementById("video-container").style.display = "none";
      };
    </script>

    <script type="module">
      import init, { WasmClient } from "./pkg/matrix_iptv.js";

      async function run() {
        try {
          await init();
          const client = new WasmClient();
          const terminal = document.getElementById("terminal");

          // Render Loop
          function step() {
            const output = client.draw();
            terminal.textContent = output;
            requestAnimationFrame(step);
          }
          requestAnimationFrame(step);

          // Input Handling
          document.addEventListener("keydown", (event) => {
            if (
              [
                "ArrowUp",
                "ArrowDown",
                "ArrowLeft",
                "ArrowRight",
                "Space",
              ].includes(event.code)
            ) {
              event.preventDefault();
            }
            client.handle_key(event.key);
          });

          // Touch Input Handling Setup
          let touchStartX = 0;
          let touchStartY = 0;
          let touchStartT = 0;

          document.addEventListener(
            "touchstart",
            (e) => {
              if (
                e.target.tagName.toLowerCase() === "button" ||
                e.target.tagName.toLowerCase() === "video"
              )
                return;
              touchStartX = e.changedTouches[0].screenX;
              touchStartY = e.changedTouches[0].screenY;
              touchStartT = Date.now();
            },
            { passive: false },
          );

          document.addEventListener("touchend", (e) => {
            if (
              e.target.tagName.toLowerCase() === "button" ||
              e.target.tagName.toLowerCase() === "video"
            )
              return;
            let touchEndX = e.changedTouches[0].screenX;
            let touchEndY = e.changedTouches[0].screenY;
            let dx = touchEndX - touchStartX;
            let dy = touchEndY - touchStartY;
            let dt = Date.now() - touchStartT;

            if (dt < 400) {
              // Tap or quick swipe
              if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 30) {
                // Horizontal Swipe
                if (dx > 0) client.handle_key("ArrowRight");
                else client.handle_key("ArrowLeft");
              } else if (Math.abs(dy) > Math.abs(dx) && Math.abs(dy) > 30) {
                // Vertical Swipe
                if (dy > 0) client.handle_key("ArrowDown");
                else client.handle_key("ArrowUp");
              } else if (Math.abs(dx) < 10 && Math.abs(dy) < 10) {
                // Tap
                client.handle_key("Enter");
              }
            }
          });
        } catch (e) {
          console.error("Wasm Init Failed:", e);
          document.getElementById("terminal").textContent =
            "CRITICAL FAILURE: WASM LOAD ERROR\n" + e;
        }
      }
      run();
    </script>
  </body>
</html>
