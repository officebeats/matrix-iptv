name: Release Build

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Tag name for the release (e.g., v3.2.1)"
        required: true
        default: "v4.0.0"

permissions:
  actions: read
  contents: write

jobs:
  preflight-npm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
      - name: Verify release tag matches package versions
        shell: bash
        run: |
          TAG="${{ github.event.inputs.tag_name || github.ref_name }}"
          VERSION="${TAG#v}"
          ROOT_VERSION="$(node -p "require('./package.json').version")"
          SHIM_VERSION="$(node -p "require('./packages/officebeats-matrix-iptv-cli/package.json').version")"
          CARGO_VERSION="$(grep -m1 '^version' Cargo.toml | sed 's/version *= *\"\(.*\)\"/\1/')"

          if [ "$ROOT_VERSION" != "$VERSION" ]; then
            echo "Root package version $ROOT_VERSION does not match release tag $TAG"
            exit 1
          fi

          if [ "$SHIM_VERSION" != "$VERSION" ]; then
            echo "Shim package version $SHIM_VERSION does not match release tag $TAG"
            exit 1
          fi

          if [ "$CARGO_VERSION" != "$VERSION" ]; then
            echo "Cargo.toml version $CARGO_VERSION does not match release tag $TAG"
            echo "Run: npm run release:update -- $VERSION"
            exit 1
          fi

      - name: Verify npm token can access registry
        run: npm whoami
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Verify root package publish permission
        shell: bash
        run: |
          set +e
          OUTPUT="$(npm publish --access public --dry-run 2>&1)"
          STATUS=$?
          set -e
          echo "$OUTPUT"

          if [ $STATUS -ne 0 ]; then
            echo "Dry-run publish failed before build started."
            exit $STATUS
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  build:
    needs: preflight-npm
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        include:
          - os: windows-latest
            artifact_name: matrix-iptv-win.exe
            asset_name: matrix-iptv-windows.exe
          - os: ubuntu-latest
            artifact_name: matrix-iptv
            asset_name: matrix-iptv-linux
          - os: macos-latest
            artifact_name: matrix-iptv
            asset_name: matrix-iptv-macos

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build release
        run: cargo build --release

      - name: Rename binary (Windows)
        if: matrix.os == 'windows-latest'
        run: mv target/release/matrix-iptv.exe target/release/${{ matrix.asset_name }}
        shell: bash

      - name: Rename binary (Unix)
        if: matrix.os != 'windows-latest'
        run: mv target/release/matrix-iptv target/release/${{ matrix.asset_name }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.asset_name }}
          path: target/release/${{ matrix.asset_name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh run download "${{ github.run_id }}" --dir artifacts --pattern "matrix-iptv-*"

      - name: Flatten artifacts
        shell: bash
        run: |
          find artifacts -mindepth 2 -type f -exec mv {} artifacts/ \;
          find artifacts -mindepth 1 -type d -empty -delete

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event.inputs.tag_name || github.ref_name }}
          files: artifacts/*
          fail_on_unmatched_files: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-npm:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
      - name: Publish root package
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish compatibility shim
        run: npm publish
        working-directory: packages/officebeats-matrix-iptv-cli
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
